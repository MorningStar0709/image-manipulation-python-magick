name: Feature Request
description: Suggest a new profile, workflow, or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Or Use Case
      description: What workflow or problem are you trying to solve?
      placeholder: Describe the real-world use case.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What change would you like to see?
      placeholder: Describe the feature, new profile, or CLI behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternatives you considered?
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Add examples, sample inputs, or references if useful.
