name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-and-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ImageMagick on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install ImageMagick on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install imagemagick -y

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run CLI smoke checks
        run: |
          python skills/image-manipulation-python-magick/scripts/image_tool.py --help
          python skills/image-manipulation-python-magick/scripts/image_tool.py profiles
          python skills/image-manipulation-python-magick/scripts/image_tool.py doctor
